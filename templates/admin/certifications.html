{% extends 'admin/base.html' %}{% block title %}Certificaciones{% endblock %}{% block content %}
<div class="card"><div class="ctitle">➕ Agregar</div>
<form method="POST"><input type="hidden" name="action" value="add"/>
<div class="fg">
  <div class="f"><label>Nombre (es)</label><input name="name"/></div>
  <div class="f"><label>Nombre (en)</label><input name="name_en"/></div>
  <div class="f full"><label>Emisor</label><input name="issuer" placeholder="UTN · 66 hs · 2022"/></div>
</div>
<button type="submit" class="btn btn-ac" style="margin-top:.7rem">➕ Agregar</button>
</form></div>
<div class="card" style="padding:0"><table>
<thead><tr><th>Nombre</th><th>Emisor</th><th>Acciones</th></tr></thead>
<tbody>{% for c in items %}
<tr>
  <form method="POST"><input type="hidden" name="action" value="update"/><input type="hidden" name="id" value="{{ c.id }}"/>
  <td><input name="name" value="{{ c.name }}" style="width:100%;padding:.35rem .5rem;border:1px solid #e5e7eb;border-radius:5px;font-size:13px;margin-bottom:.3rem"/>
      <input name="name_en" value="{{ c.name_en }}" style="width:100%;padding:.35rem .5rem;border:1px solid #e5e7eb;border-radius:5px;font-size:13px"/></td>
  <td><input name="issuer" value="{{ c.issuer }}" style="width:100%;padding:.35rem .5rem;border:1px solid #e5e7eb;border-radius:5px;font-size:13px"/></td>
  <td style="white-space:nowrap">
    <button type="submit" class="btn btn-gh btn-sm">💾</button>
  </form>
  <form method="POST" onsubmit="return confirm('¿Eliminar?')" style="display:inline">
    <input type="hidden" name="action" value="delete"/><input type="hidden" name="id" value="{{ c.id }}"/>
    <button type="submit" class="btn btn-re btn-sm">🗑️</button>
  </form></td>
</tr>{% endfor %}</tbody></table></div>
{% endblock %}
