{% extends 'admin/base.html' %}{% block title %}Habilidades{% endblock %}{% block content %}
<div class="card"><div class="ctitle">➕ Agregar grupo</div>
<form method="POST"><input type="hidden" name="action" value="add"/>
<div class="fg">
  <div class="f"><label>Título (es)</label><input name="title" placeholder="Python"/></div>
  <div class="f"><label>Título (en)</label><input name="title_en" placeholder="Python"/></div>
  <div class="f full"><label>Items (separados por ·)</label><input name="items" placeholder="OOP · Flask · Tkinter"/></div>
</div>
<button type="submit" class="btn btn-ac" style="margin-top:.7rem">➕ Agregar</button>
</form></div>
{% for s in items %}
<div class="card"><div class="ctitle">{{ s.title }}</div>
<form method="POST"><input type="hidden" name="action" value="update"/><input type="hidden" name="id" value="{{ s.id }}"/>
<div class="fg">
  <div class="f"><label>Título (es)</label><input name="title" value="{{ s.title }}"/></div>
  <div class="f"><label>Título (en)</label><input name="title_en" value="{{ s.title_en }}"/></div>
  <div class="f full"><label>Items</label><input name="items" value="{{ s.items }}"/></div>
</div>
<div style="display:flex;gap:.5rem;margin-top:.7rem">
  <button type="submit" class="btn btn-bk">💾 Guardar</button>
  <button type="submit" form="ds{{ s.id }}" class="btn btn-re">🗑️ Eliminar</button>
</div></form>
<form id="ds{{ s.id }}" method="POST" onsubmit="return confirm('¿Eliminar?')">
  <input type="hidden" name="action" value="delete"/><input type="hidden" name="id" value="{{ s.id }}"/>
</form></div>
{% endfor %}{% endblock %}
